<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DeepSeno Recorder</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: ui-monospace, 'SF Mono', Menlo, 'Cascadia Code', monospace;
      background: transparent;
      color: #3f3f46;
      overflow: hidden;
      -webkit-app-region: drag;
      user-select: none;
    }

    /* --- Light industrial container --- */
    .recorder-glass {
      position: relative;
      background: rgba(250, 250, 249, 0.92);
      backdrop-filter: blur(20px) saturate(1.2);
      -webkit-backdrop-filter: blur(20px) saturate(1.2);
      border: 1px solid rgba(161, 161, 170, 0.25);
      border-radius: 12px;
      box-shadow:
        0 4px 16px rgba(0, 0, 0, 0.08),
        0 0 0 0.5px rgba(0, 0, 0, 0.04) inset;
      overflow: hidden;
    }

    /* --- Toolbar --- */
    .toolbar {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 14px;
      height: 52px;
    }

    /* --- Waveform animation --- */
    .waveform {
      display: flex;
      align-items: center;
      gap: 2px;
      height: 20px;
      flex-shrink: 0;
    }
    .waveform .bar {
      width: 2.5px;
      border-radius: 1.5px;
      background: #ef4444;
      animation: wave 1.2s ease-in-out infinite;
    }
    .waveform .bar:nth-child(1) { height: 6px;  animation-delay: 0s; }
    .waveform .bar:nth-child(2) { height: 14px; animation-delay: 0.15s; }
    .waveform .bar:nth-child(3) { height: 10px; animation-delay: 0.3s; }
    .waveform .bar:nth-child(4) { height: 16px; animation-delay: 0.45s; }
    .waveform .bar:nth-child(5) { height: 8px;  animation-delay: 0.6s; }
    @keyframes wave {
      0%, 100% { transform: scaleY(0.4); opacity: 0.5; }
      50% { transform: scaleY(1); opacity: 1; }
    }

    /* --- REC indicator (collapsed mode) --- */
    .rec-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: #ef4444;
      animation: pulse-dot 1.5s ease-in-out infinite;
      flex-shrink: 0;
      display: none;
    }
    body.collapsed .rec-dot { display: block; }
    body.collapsed .waveform { display: none; }
    @keyframes pulse-dot {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }

    /* --- Timer --- */
    .timer {
      font-size: 15px;
      font-weight: 600;
      letter-spacing: 0.5px;
      min-width: 52px;
      font-variant-numeric: tabular-nums;
      color: #3f3f46;
    }

    /* --- Expand/collapse button --- */
    .toggle-btn {
      -webkit-app-region: no-drag;
      display: flex;
      align-items: center;
      justify-content: center;
      width: 26px;
      height: 26px;
      background: rgba(113, 113, 122, 0.08);
      border: 1px solid rgba(161, 161, 170, 0.15);
      border-radius: 6px;
      color: #a1a1aa;
      cursor: pointer;
      transition: all 0.15s ease;
      flex-shrink: 0;
      margin-left: auto;
    }
    .toggle-btn:hover {
      background: rgba(113, 113, 122, 0.15);
      color: #71717a;
    }
    .toggle-btn svg {
      width: 12px;
      height: 12px;
      transition: transform 0.25s ease;
    }
    body.expanded .toggle-btn svg {
      transform: rotate(180deg);
    }

    /* --- Stop button --- */
    .stop-btn {
      -webkit-app-region: no-drag;
      display: flex;
      align-items: center;
      gap: 5px;
      padding: 5px 12px;
      background: #27272a;
      border: none;
      border-radius: 8px;
      color: #fafafa;
      font-family: inherit;
      font-size: 11px;
      font-weight: 600;
      cursor: pointer;
      letter-spacing: 0.3px;
      transition: all 0.15s ease;
      flex-shrink: 0;
    }
    .stop-btn:hover {
      background: #3f3f46;
    }
    .stop-btn:active {
      transform: scale(0.97);
    }
    .stop-icon {
      width: 7px;
      height: 7px;
      background: #fafafa;
      border-radius: 1.5px;
    }

    /* --- Transcript panel --- */
    #transcript {
      max-height: 0;
      overflow: hidden;
      transition: max-height 0.25s ease, padding 0.25s ease, opacity 0.2s ease;
      opacity: 0;
      padding: 0 14px;
      font-size: 12px;
      color: #a1a1aa;
      line-height: 1.6;
    }
    body.expanded #transcript {
      /* Fill remaining window height below toolbar (52px) */
      max-height: calc(100vh - 52px);
      overflow-y: auto;
      opacity: 1;
      padding: 8px 14px 12px;
      border-top: 1px solid rgba(161, 161, 170, 0.12);
      -webkit-app-region: no-drag;
    }
    .seg-line {
      padding: 3px 0;
      word-break: break-word;
    }
    .seg-line + .seg-line {
      border-top: 1px solid rgba(161, 161, 170, 0.08);
    }
    .seg-time {
      color: #a1a1aa;
      font-size: 10px;
      margin-right: 6px;
      font-variant-numeric: tabular-nums;
    }
    .seg-speaker {
      font-size: 10px;
      font-weight: 600;
      margin-right: 5px;
      padding: 1px 4px;
      border-radius: 3px;
      background: rgba(0,0,0,0.04);
      letter-spacing: 0.3px;
      white-space: nowrap;
    }
    .seg-line.optimized { color: #52525b; }

    /* --- Processing state --- */
    body.processing .waveform { display: none; }
    body.processing .rec-dot { display: none; }
    body.processing .stop-btn { display: none; }

    .processing-indicator {
      display: none;
      align-items: center;
      gap: 8px;
      flex: 1;
    }
    body.processing .processing-indicator { display: flex; }

    .spinner {
      width: 14px;
      height: 14px;
      border: 2px solid rgba(113, 113, 122, 0.15);
      border-top-color: #71717a;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .processing-text {
      font-size: 11px;
      font-weight: 500;
      color: #71717a;
      letter-spacing: 0.3px;
    }

    .processing-dots::after {
      content: '';
      animation: dots 1.5s steps(4, end) infinite;
    }
    @keyframes dots {
      0% { content: ''; }
      25% { content: '.'; }
      50% { content: '..'; }
      75% { content: '...'; }
    }

    /* --- Done state --- */
    body.done .waveform { display: none; }
    body.done .rec-dot { display: none; }
    body.done .stop-btn { display: none; }
    body.done .toggle-btn { display: none; }

    .done-indicator {
      display: none;
      align-items: center;
      gap: 8px;
      flex: 1;
    }
    body.done .done-indicator { display: flex; }
    body.done .processing-indicator { display: none; }

    .done-check {
      width: 14px;
      height: 14px;
      color: #22c55e;
    }
    .done-text {
      font-size: 11px;
      font-weight: 500;
      color: #52525b;
      letter-spacing: 0.3px;
    }

    /* --- Scene label (inline in toolbar) --- */
    .scene-label {
      display: none;
      align-items: center;
      gap: 3px;
      padding: 2px 7px 2px 5px;
      border-radius: 5px;
      font-size: 9px;
      font-weight: 600;
      letter-spacing: 0.4px;
      line-height: 1;
      flex-shrink: 0;
      white-space: nowrap;
      border: 1px solid rgba(161,161,170,0.2);
      background: rgba(244,244,245,0.8);
      color: #71717a;
    }
    .scene-label.visible {
      display: flex;
    }
    .scene-label svg {
      width: 10px;
      height: 10px;
      opacity: 0.7;
    }
    /* media scene — inverted to signal external content */
    .scene-label.scene-media {
      background: #27272a;
      color: #d4d4d8;
      border-color: #3f3f46;
    }
    .scene-label.scene-media svg { opacity: 0.85; }

    /* --- Scrollbar --- */
    #transcript::-webkit-scrollbar { width: 3px; }
    #transcript::-webkit-scrollbar-track { background: transparent; }
    #transcript::-webkit-scrollbar-thumb {
      background: rgba(161, 161, 170, 0.2);
      border-radius: 2px;
    }
    #transcript::-webkit-scrollbar-thumb:hover {
      background: rgba(161, 161, 170, 0.35);
    }
  </style>
</head>
<body class="expanded">
  <div class="recorder-glass">
    <div class="toolbar">
      <div class="scene-label" id="sceneLabel"></div>
      <div class="waveform">
        <div class="bar"></div>
        <div class="bar"></div>
        <div class="bar"></div>
        <div class="bar"></div>
        <div class="bar"></div>
      </div>
      <div class="rec-dot"></div>
      <div class="timer" id="timer">00:00</div>
      <div class="processing-indicator">
        <div class="spinner"></div>
        <span class="processing-text" id="processingText">优化文本中<span class="processing-dots"></span></span>
      </div>
      <div class="done-indicator">
        <svg class="done-check" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="20 6 9 17 4 12"></polyline>
        </svg>
        <span class="done-text" id="doneText">已复制到剪贴板</span>
      </div>
      <button class="toggle-btn" id="toggleExpand">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="6 9 12 15 18 9"></polyline>
        </svg>
      </button>
      <button class="stop-btn" id="stopBtn">
        <div class="stop-icon"></div>
        停止
      </button>
    </div>
    <div id="transcript"></div>
  </div>
  <script type="module" src="./recorder-entry.ts"></script>
</body>
</html>
