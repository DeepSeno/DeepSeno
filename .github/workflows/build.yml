name: Build

on:
  workflow_dispatch:
    inputs:
      version:
        description: '版本号'
        required: true
        type: string
        default: ''
      prerelease:
        description: '测试版（pre-release）'
        required: false
        type: boolean
        default: false

# Cancel in-progress runs for the same branch / PR
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '22'
  API_BASE_URL: ${{ secrets.API_BASE_URL || '' }}

jobs:
  # ────────────────────────────────────────────────────────────
  # macOS (arm64 + x64 universal build, DMG + ZIP)
  # ────────────────────────────────────────────────────────────
  build-macos:
    runs-on: macos-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ── Toolchain ──────────────────────────────────────────
      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: latest

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      # ── Install dependencies ───────────────────────────────
      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # ── Bundle platform resources ──────────────────────────
      # Each script is idempotent — already-present files are skipped.
      # --all downloads for both darwin-arm64 and darwin-x64 (needed for
      # the universal macOS build that packages both architectures).
      - name: Bundle FFmpeg (darwin-arm64)
        run: bash scripts/bundle-ffmpeg.sh --platform darwin-arm64

      - name: Bundle FFmpeg (darwin-x64)
        run: bash scripts/bundle-ffmpeg.sh --platform darwin-x64

      - name: Bundle llama-server (darwin-arm64)
        run: bash scripts/bundle-llama-server.sh --platform darwin-arm64

      - name: Bundle llama-server (darwin-x64)
        run: bash scripts/bundle-llama-server.sh --platform darwin-x64

      - name: Bundle sherpa-models
        run: bash scripts/bundle-sherpa-models.sh

      - name: Bundle fonts
        run: bash scripts/bundle-fonts.sh

      # ── Code signing (optional, gated by secrets) ──────────
      # Requires the following GitHub repo secrets:
      #   APPLE_CERTIFICATE_BASE64      – Developer ID Application .p12 (base64)
      #   APPLE_CERTIFICATE_PASSWORD    – .p12 passphrase
      #   APPLE_TEAM_ID                 – 10-char Apple Team ID
      # Without them the build will run unsigned — fine for CI / pre-release.
      - name: Import Apple code-signing certificate
        id: import-cert
        env:
          CERT_BASE64: ${{ secrets.APPLE_CERTIFICATE_BASE64 }}
          CERT_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD || 'temporary-password' }}
        run: |
          if [ -z "${CERT_BASE64}" ]; then
            echo "Skipping — no code-signing certificate configured."
            exit 0
          fi
          CERT_PATH="$RUNNER_TEMP/apple-signing.p12"
          echo "$CERT_BASE64" | base64 -d > "$CERT_PATH"
          security create-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security import "$CERT_PATH" -k build.keychain -P "$CERT_PASSWORD" \
            -T /usr/bin/codesign -T /usr/bin/productsign
          security set-key-partition-list -S apple-tool:,apple:,codesign: \
            -s -k "$KEYCHAIN_PASSWORD" build.keychain
          # Prepend the build keychain so codesign finds it first
          EXISTING=$(security list-keychains -d user | sed 's/"//g')
          # shellcheck disable=SC2086
          security list-keychains -d user -s build.keychain $EXISTING
          echo "CSC_LINK=$CERT_PATH" >> "$GITHUB_ENV"
          echo "CSC_KEY_PASSWORD=$CERT_PASSWORD" >> "$GITHUB_ENV"

      # ── Install cross-arch native deps for x64 + universal build ─
      - name: Install darwin-x64 native deps
        run: |
          set -e
          SHERPA_VER=$(node -e "console.log(require('sherpa-onnx-node/package.json').version)")
          SQLITE_VEC_VER=$(node -p "JSON.parse(require('fs').readFileSync('node_modules/sqlite-vec/package.json','utf8')).version")
          echo "sherpa-onnx-node: ${SHERPA_VER}, sqlite-vec: ${SQLITE_VEC_VER}"

          TMPDIR=$(mktemp -d)
          trap 'rm -rf "$TMPDIR"' EXIT

          # sherpa-onnx-darwin-x64
          if [ ! -d node_modules/sherpa-onnx-darwin-x64 ]; then
            npm pack "sherpa-onnx-darwin-x64@${SHERPA_VER}" --pack-destination "$TMPDIR" 2>/dev/null || \
              npm pack "sherpa-onnx-darwin-x64@^${SHERPA_VER}" --pack-destination "$TMPDIR"
            mkdir -p "$TMPDIR/sherpa"
            tar -xzf "$TMPDIR"/sherpa-onnx-darwin-x64-*.tgz -C "$TMPDIR/sherpa"
            mv "$TMPDIR/sherpa/package" node_modules/sherpa-onnx-darwin-x64
            echo "✅ sherpa-onnx-darwin-x64 installed"
          fi

          # sqlite-vec-darwin-x64
          if [ ! -d node_modules/sqlite-vec-darwin-x64 ]; then
            npm pack "sqlite-vec-darwin-x64@${SQLITE_VEC_VER}" --pack-destination "$TMPDIR" 2>/dev/null || \
              npm pack "sqlite-vec-darwin-x64@${SQLITE_VEC_VER}" --pack-destination "$TMPDIR"
            mkdir -p "$TMPDIR/sqlite"
            tar -xzf "$TMPDIR"/sqlite-vec-darwin-x64-*.tgz -C "$TMPDIR/sqlite"
            mv "$TMPDIR/sqlite/package" node_modules/sqlite-vec-darwin-x64
            echo "✅ sqlite-vec-darwin-x64 installed"
          fi

      # ── Set version from workflow input ──────────────────────
      - name: Set version
        run: npm version "${{ inputs.version }}" --no-git-tag-version --allow-same-version

      # ── Build & Package ────────────────────────────────────
      - name: Build (electron-vite)
        run: pnpm build

      - name: Rebuild native addons (sherpa-onnx-node)
        run: pnpm exec electron-rebuild -f -w sherpa-onnx-node

      - name: Package (electron-builder)
        env:
          # Notarization via App Store Connect API Key.
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          if [ -n "${{ secrets.APPLE_API_KEY }}" ] && \
             [ -n "${APPLE_API_KEY_ID:-}" ] && \
             [ -n "${APPLE_API_ISSUER:-}" ]; then
            echo "[CI] Notarization: writing API key to file..."
            API_KEY_FILE="$RUNNER_TEMP/AuthKey.p8"
            echo "${{ secrets.APPLE_API_KEY }}" > "$API_KEY_FILE"
            export APPLE_API_KEY="$API_KEY_FILE"
            echo "[CI] Notarization enabled"
          else
            echo "[CI] Notarization: API key not configured"
          fi
          pnpm exec electron-builder --mac --arm64 --x64

      # ── Rename arch-less files to include x64 suffix ────────
      - name: Rename x64 artifacts
        run: |
          cd out
          VER="${{ inputs.version }}"
          rename_and_rewrite_manifest() {
            local old="$1"
            local new="$2"
            if [ -f "$old" ]; then
              mv "$old" "$new"
              echo "Renamed $old → $new"
              if [ -f "$old.blockmap" ]; then
                mv "$old.blockmap" "$new.blockmap"
                echo "Renamed $old.blockmap → $new.blockmap"
              fi
              if [ -f latest-mac.yml ]; then
                node -e 'const fs=require("fs"); const [file, oldName, newName]=process.argv.slice(1); const text=fs.readFileSync(file,"utf8"); fs.writeFileSync(file, text.split(oldName).join(newName));' latest-mac.yml "$old" "$new"
              fi
            fi
          }
          rename_and_rewrite_manifest "DeepSeno-${VER}.dmg" "DeepSeno-${VER}-x64.dmg"
          rename_and_rewrite_manifest "DeepSeno-${VER}-mac.zip" "DeepSeno-${VER}-x64-mac.zip"
        shell: bash

      # ── Upload artifacts ───────────────────────────────────
      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: deepseno-macos
          path: |
            out/*.dmg
            out/*.zip
            out/*.blockmap
            out/latest-mac.yml
          if-no-files-found: error

      # ── Cleanup keychain ───────────────────────────────────
      - name: Cleanup keychain
        if: always() && steps.import-cert.outcome == 'success'
        run: security delete-keychain build.keychain || true

  # ────────────────────────────────────────────────────────────
  # Windows (x64, NSIS installer)
  # ────────────────────────────────────────────────────────────
  build-windows:
    runs-on: windows-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ── Toolchain ──────────────────────────────────────────
      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: latest

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      # ── Install dependencies ───────────────────────────────
      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # ── Bundle platform resources ──────────────────────────
      # Each bundle script is idempotent — already-present files are skipped.
      # Explicit shell: bash is required on Windows runners.
      - name: Bundle FFmpeg (win32-x64)
        shell: bash
        run: bash scripts/bundle-ffmpeg.sh --platform win32-x64

      - name: Bundle llama-server (win32-x64)
        shell: bash
        run: bash scripts/bundle-llama-server.sh --platform win32-x64

      - name: Bundle sherpa-models
        shell: bash
        run: bash scripts/bundle-sherpa-models.sh

      - name: Bundle fonts
        shell: bash
        run: bash scripts/bundle-fonts.sh

      - name: Compile Windows tools (getfg.exe / setfg.exe)
        shell: bash
        run: bash scripts/bundle-win-tools.sh

      # ── Pre-build check ────────────────────────────────────
      # Mirrors the prebuild:win script in package.json.
      # Fails fast if required assets are missing.
      - name: Pre-build check
        run: |
          node -e "
          const f = require('fs');
          const checks = [
            ['resources/ffmpeg/win32-x64/ffmpeg.exe', 'bundle-ffmpeg.sh --platform win32-x64'],
            ['scripts/getfg.exe', 'bundle-win-tools.sh'],
            ['scripts/setfg.exe', 'bundle-win-tools.sh'],
          ];
          let ok = true;
          for (const [p, src] of checks) {
            if (!f.existsSync(p)) {
              console.error('MISSING: %s — run %s', p, src);
              ok = false;
            }
          }
          if (ok) console.log('All Windows deps present.');
          else process.exit(1);
          "

      # ── Set version from workflow input ──────────────────────
      - name: Set version
        run: npm version "${{ inputs.version }}" --no-git-tag-version --allow-same-version

      # ── Build & Package ────────────────────────────────────
      - name: Build (electron-vite)
        run: pnpm build

      - name: Rebuild native addons (sherpa-onnx-node)
        run: pnpm exec electron-rebuild -f -w sherpa-onnx-node

      - name: Package (electron-builder)
        env:
          # Optional code-signing certificate (PFX base64).
          # Build runs unsigned if these are missing.
          CSC_LINK: ${{ secrets.WIN_CERTIFICATE_BASE64 }}
          CSC_KEY_PASSWORD: ${{ secrets.WIN_CERTIFICATE_PASSWORD }}
        run: pnpm exec electron-builder --win --x64

      # ── Rename to include arch suffix ───────────────────────
      - name: Rename Windows artifacts
        shell: bash
        run: |
          cd out
          VER="${{ inputs.version }}"
          candidates=(
            "DeepSeno.Setup.${VER}.exe"
            "DeepSeno Setup ${VER}.exe"
            "DeepSeno-Setup-${VER}.exe"
          )
          for f in "${candidates[@]}"; do
            if [ -f "$f" ]; then
              new="DeepSeno-${VER}-win-x64.exe"
              mv "$f" "$new"
              echo "Renamed $f → $new"
              if [ -f "$f.blockmap" ]; then
                mv "$f.blockmap" "$new.blockmap"
                echo "Renamed $f.blockmap → $new.blockmap"
              fi
              if [ -f latest.yml ]; then
                node -e 'const fs=require("fs"); const [file, oldName, newName]=process.argv.slice(1); const text=fs.readFileSync(file,"utf8"); fs.writeFileSync(file, text.split(oldName).join(newName));' latest.yml "$f" "$new"
              fi
              break
            fi
          done

      # ── Upload artifacts ───────────────────────────────────
      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: deepseno-windows
          path: |
            out/*.exe
            out/*.blockmap
            out/latest.yml
          if-no-files-found: error

  # ────────────────────────────────────────────────────────────
  # GitHub Release
  # ────────────────────────────────────────────────────────────
  create-release:
    needs: [build-macos, build-windows]
    runs-on: ubuntu-latest
    timeout-minutes: 90

    permissions:
      contents: write

    steps:
      - name: Compute tag name
        id: tag
        run: |
          VER="${{ inputs.version }}"
          if ${{ inputs.prerelease }}; then
            TAG="pre-release-${VER}"
          else
            TAG="v${VER}"
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "name=DeepSeno ${TAG}" >> "$GITHUB_OUTPUT"

      - name: Download macOS artifacts
        uses: actions/download-artifact@v4
        with:
          name: deepseno-macos
          path: artifacts/macos

      - name: Download Windows artifacts
        uses: actions/download-artifact@v4
        with:
          name: deepseno-windows
          path: artifacts/windows

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: ${{ steps.tag.outputs.name }}
          body: |
            **DeepSeno ${{ steps.tag.outputs.name }}**

            ${{ inputs.prerelease && '> ⚠️ 这是测试版本，仅供测试使用。' || '' }}

            See [CHANGELOG.md](${{ github.server_url }}/${{ github.repository }}/blob/main/CHANGELOG.md) for details.
          prerelease: ${{ inputs.prerelease }}
          draft: false
          files: |
            artifacts/macos/*
            artifacts/windows/*
          fail_on_unmatched_files: true

      # ── Push to COS/CDN and register release records ───────
      - name: Push to COS and release server
        timeout-minutes: 75
        env:
          API_BASE: ${{ secrets.API_BASE_URL }}
          ADMIN_EMAIL: ${{ secrets.RELEASE_ADMIN_EMAIL }}
          ADMIN_PASSWORD: ${{ secrets.RELEASE_ADMIN_PASSWORD }}
          COS_SECRET_ID: ${{ secrets.COS_SECRET_ID }}
          COS_SECRET_KEY: ${{ secrets.COS_SECRET_KEY }}
          COS_BUCKET_URL: ${{ secrets.COS_BUCKET_URL }}
          COS_REGION: ${{ secrets.COS_REGION || 'ap-beijing' }}
          COS_CDN_DOMAIN: ${{ secrets.COS_CDN_DOMAIN }}
        run: |
          [ -z "${ADMIN_EMAIL:-}" ] && echo "[Release] ADMIN_EMAIL not set, skipping" && exit 0
          set -euo pipefail

          for name in API_BASE ADMIN_EMAIL ADMIN_PASSWORD COS_SECRET_ID COS_SECRET_KEY COS_BUCKET_URL COS_REGION COS_CDN_DOMAIN; do
            if [ -z "${!name:-}" ]; then
              echo "[Release] $name not set"
              exit 1
            fi
          done

          echo "::add-mask::$COS_SECRET_ID"
          echo "::add-mask::$COS_SECRET_KEY"

          echo "[Release] Logging in..."
          TOKEN=$(curl -sf "$API_BASE/auth/login" \
            -H "Content-Type: application/json" \
            -d "{\"email\":\"$ADMIN_EMAIL\",\"password\":\"$ADMIN_PASSWORD\"}" | \
            python3 -c "import sys,json; print(json.load(sys.stdin).get('token',''))")
          [ -z "$TOKEN" ] && echo "Login failed" && exit 1

          echo "[Release] Installing coscmd..."
          python3 -m pip install --user --disable-pip-version-check -q coscmd
          export PATH="$HOME/.local/bin:$PATH"

          COS_BUCKET=$(python3 - <<'PY'
          import os
          from urllib.parse import urlparse

          raw = os.environ["COS_BUCKET_URL"].strip()
          parsed = urlparse(raw if "://" in raw else "https://" + raw)
          host = parsed.netloc or parsed.path
          bucket = host.split(".cos.")[0]
          if not bucket:
              raise SystemExit("invalid COS_BUCKET_URL")
          print(bucket)
          PY
          )
          CDN_DOMAIN="${COS_CDN_DOMAIN#https://}"
          CDN_DOMAIN="${CDN_DOMAIN#http://}"
          CDN_BASE="https://${CDN_DOMAIN%/}"
          VERSION="${{ inputs.version }}"

          echo "[Release] Configuring coscmd for bucket ${COS_BUCKET} (${COS_REGION})..."
          coscmd config \
            -a "$COS_SECRET_ID" \
            -s "$COS_SECRET_KEY" \
            -b "$COS_BUCKET" \
            -r "$COS_REGION" \
            -m 16 \
            -p 8 \
            --retry 5 \
            --timeout 120

          # Upload updater/install files and capture CDN URLs. Files are sent
          # directly from GitHub Actions to COS; the server only receives final
          # CDN URLs during confirm-upload.
          # latest*.yml is intentionally uploaded last so clients never see a
          # manifest before all referenced ZIP/EXE/blockmap assets are ready.
          CONFIRM_DIR=$(mktemp -d)

          add_confirm_item() {
            local filename="$1"
            local cdn_url="$2"
            local fsize="$3"
            local checksum="$4"
            local item_file
            item_file=$(mktemp "$CONFIRM_DIR/item.XXXXXX")
            python3 -c 'import json,sys; print(json.dumps({"filename":sys.argv[1],"cdn_url":sys.argv[2],"size":int(sys.argv[3]),"checksum":sys.argv[4]}, separators=(",",":")))' "$filename" "$cdn_url" "$fsize" "$checksum" > "$item_file"
          }

          upload_file_to_cos() {
            local f="$1"
            local fname fsize checksum key cdn_url
            fname=$(basename "$f")
            fsize=$(stat -c%s "$f" 2>/dev/null || stat -f%z "$f" 2>/dev/null)
            checksum=$(sha256sum "$f" | awk '{print $1}')
            key="releases/$fname"
            cdn_url="${CDN_BASE}/${key}"
            echo "[Release] Uploading $fname (${fsize} bytes)..."

            coscmd upload -f "$f" "$key"
            echo "[Release] OK, CDN: $cdn_url"
            add_confirm_item "$fname" "$cdn_url" "$fsize" "$checksum"
          }

          upload_manifest_to_cos() {
            local f="$1"
            local fname fsize checksum version_key root_key cdn_url manifest_headers
            fname=$(basename "$f")
            fsize=$(stat -c%s "$f" 2>/dev/null || stat -f%z "$f" 2>/dev/null)
            checksum=$(sha256sum "$f" | awk '{print $1}')
            version_key="releases/${VERSION}/${fname}"
            root_key="releases/${fname}"
            cdn_url="${CDN_BASE}/${root_key}"
            manifest_headers='{"Cache-Control":"no-cache, no-store, max-age=0","Content-Type":"application/x-yaml"}'
            echo "[Release] Uploading $fname (${fsize} bytes)..."

            # Keep a versioned copy for inspection, then update the root
            # manifest last because electron-updater reads it as the switch.
            coscmd upload -f -H "$manifest_headers" "$f" "$version_key"
            coscmd upload -f -H "$manifest_headers" "$f" "$root_key"
            echo "[Release] OK, CDN: $cdn_url"
            add_confirm_item "$fname" "$cdn_url" "$fsize" "$checksum"
          }

          purge_cdn_manifests() {
            python3 - <<'PY'
          import datetime
          import hashlib
          import hmac
          import json
          import os
          import sys
          import time
          import urllib.request

          secret_id = os.environ["COS_SECRET_ID"]
          secret_key = os.environ["COS_SECRET_KEY"]
          cdn_base = "https://" + os.environ["COS_CDN_DOMAIN"].removeprefix("https://").removeprefix("http://").rstrip("/")
          urls = [
              f"{cdn_base}/releases/latest-mac.yml",
              f"{cdn_base}/releases/latest.yml",
          ]

          service = "cdn"
          host = "cdn.tencentcloudapi.com"
          endpoint = f"https://{host}/"
          action = "PurgeUrlsCache"
          version = "2018-06-06"
          timestamp = int(time.time())
          date = datetime.datetime.utcfromtimestamp(timestamp).strftime("%Y-%m-%d")
          payload = json.dumps({"Urls": urls}, separators=(",", ":"))

          canonical_headers = f"content-type:application/json; charset=utf-8\nhost:{host}\nx-tc-action:{action.lower()}\n"
          signed_headers = "content-type;host;x-tc-action"
          canonical_request = "\n".join([
              "POST",
              "/",
              "",
              canonical_headers,
              signed_headers,
              hashlib.sha256(payload.encode("utf-8")).hexdigest(),
          ])
          credential_scope = f"{date}/{service}/tc3_request"
          string_to_sign = "\n".join([
              "TC3-HMAC-SHA256",
              str(timestamp),
              credential_scope,
              hashlib.sha256(canonical_request.encode("utf-8")).hexdigest(),
          ])

          def sign(key, msg):
              return hmac.new(key, msg.encode("utf-8"), hashlib.sha256).digest()

          secret_date = sign(("TC3" + secret_key).encode("utf-8"), date)
          secret_service = sign(secret_date, service)
          secret_signing = sign(secret_service, "tc3_request")
          signature = hmac.new(secret_signing, string_to_sign.encode("utf-8"), hashlib.sha256).hexdigest()
          authorization = (
              "TC3-HMAC-SHA256 "
              f"Credential={secret_id}/{credential_scope}, "
              f"SignedHeaders={signed_headers}, "
              f"Signature={signature}"
          )
          request = urllib.request.Request(
              endpoint,
              data=payload.encode("utf-8"),
              headers={
                  "Authorization": authorization,
                  "Content-Type": "application/json; charset=utf-8",
                  "Host": host,
                  "X-TC-Action": action,
                  "X-TC-Timestamp": str(timestamp),
                  "X-TC-Version": version,
              },
              method="POST",
          )
          with urllib.request.urlopen(request, timeout=30) as response:
              body = response.read().decode("utf-8")
          print(f"[Release] Purged CDN manifests: {', '.join(urls)}")
          parsed = json.loads(body)
          if "Error" in parsed.get("Response", {}):
              print(body)
              sys.exit(1)
          print(body)
          PY
          }

          upload_group() {
            local uploader="$1"
            shift
            local f
            for f in "$@"; do
              [ -f "$f" ] || continue
              "$uploader" "$f"
            done
          }

          upload_group upload_file_to_cos artifacts/macos/*.dmg artifacts/windows/*.exe
          upload_group upload_file_to_cos artifacts/macos/*.zip
          upload_group upload_file_to_cos artifacts/macos/*.blockmap artifacts/windows/*.blockmap
          upload_group upload_manifest_to_cos artifacts/macos/latest-mac.yml artifacts/windows/latest.yml
          purge_cdn_manifests

          rm -f /tmp/confirm.json
          python3 -c 'import glob,json,sys; items=[]; [items.append(json.load(open(path, encoding="utf-8"))) for path in sorted(glob.glob(sys.argv[1] + "/item.*"))]; print(json.dumps({"files":items}, separators=(",",":")))' "$CONFIRM_DIR" > /tmp/confirm.json
          echo "[Release] Confirming uploads..."
          curl -sf "$API_BASE/admin/releases/confirm-upload" \
            -H "Authorization: Bearer $TOKEN" \
            -H "Content-Type: application/json" \
            -d @/tmp/confirm.json
          echo "[Release] Confirmed!"
