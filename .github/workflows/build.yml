name: Build

on:
  workflow_dispatch:
    inputs:
      version:
        description: '版本号'
        required: true
        type: string
        default: ''
      prerelease:
        description: '测试版（pre-release）'
        required: false
        type: boolean
        default: false

# Cancel in-progress runs for the same branch / PR
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '22'
  API_BASE_URL: ${{ secrets.API_BASE_URL || '' }}

jobs:
  # ────────────────────────────────────────────────────────────
  # macOS (arm64 + x64 universal build, DMG + ZIP)
  # ────────────────────────────────────────────────────────────
  build-macos:
    runs-on: macos-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ── Toolchain ──────────────────────────────────────────
      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: latest

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      # ── Install dependencies ───────────────────────────────
      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # ── Bundle platform resources ──────────────────────────
      # Each script is idempotent — already-present files are skipped.
      # --all downloads for both darwin-arm64 and darwin-x64 (needed for
      # the universal macOS build that packages both architectures).
      - name: Bundle FFmpeg (darwin-arm64)
        run: bash scripts/bundle-ffmpeg.sh --platform darwin-arm64

      - name: Bundle FFmpeg (darwin-x64)
        run: bash scripts/bundle-ffmpeg.sh --platform darwin-x64

      - name: Bundle llama-server (darwin-arm64)
        run: bash scripts/bundle-llama-server.sh --platform darwin-arm64

      - name: Bundle llama-server (darwin-x64)
        run: bash scripts/bundle-llama-server.sh --platform darwin-x64

      - name: Bundle sherpa-models
        run: bash scripts/bundle-sherpa-models.sh

      - name: Bundle fonts
        run: bash scripts/bundle-fonts.sh

      # ── Code signing (optional, gated by secrets) ──────────
      # Requires the following GitHub repo secrets:
      #   APPLE_CERTIFICATE_BASE64      – Developer ID Application .p12 (base64)
      #   APPLE_CERTIFICATE_PASSWORD    – .p12 passphrase
      #   APPLE_TEAM_ID                 – 10-char Apple Team ID
      # Without them the build will run unsigned — fine for CI / pre-release.
      - name: Import Apple code-signing certificate
        id: import-cert
        env:
          CERT_BASE64: ${{ secrets.APPLE_CERTIFICATE_BASE64 }}
          CERT_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD || 'temporary-password' }}
        run: |
          if [ -z "${CERT_BASE64}" ]; then
            echo "Skipping — no code-signing certificate configured."
            exit 0
          fi
          CERT_PATH="$RUNNER_TEMP/apple-signing.p12"
          echo "$CERT_BASE64" | base64 -d > "$CERT_PATH"
          security create-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security import "$CERT_PATH" -k build.keychain -P "$CERT_PASSWORD" \
            -T /usr/bin/codesign -T /usr/bin/productsign
          security set-key-partition-list -S apple-tool:,apple:,codesign: \
            -s -k "$KEYCHAIN_PASSWORD" build.keychain
          # Prepend the build keychain so codesign finds it first
          EXISTING=$(security list-keychains -d user | sed 's/"//g')
          security list-keychains -d user -s build.keychain $EXISTING
          echo "CSC_LINK=$CERT_PATH" >> "$GITHUB_ENV"
          echo "CSC_KEY_PASSWORD=$CERT_PASSWORD" >> "$GITHUB_ENV"

      # ── Install cross-arch native deps for x64 + universal build ─
      - name: Install darwin-x64 native deps
        run: |
          set -e
          SHERPA_VER=$(node -e "console.log(require('sherpa-onnx-node/package.json').version)")
          SQLITE_VEC_VER=$(node -p "JSON.parse(require('fs').readFileSync('node_modules/sqlite-vec/package.json','utf8')).version")
          echo "sherpa-onnx-node: ${SHERPA_VER}, sqlite-vec: ${SQLITE_VEC_VER}"

          TMPDIR=$(mktemp -d)
          trap "rm -rf $TMPDIR" EXIT

          # sherpa-onnx-darwin-x64
          if [ ! -d node_modules/sherpa-onnx-darwin-x64 ]; then
            npm pack "sherpa-onnx-darwin-x64@${SHERPA_VER}" --pack-destination "$TMPDIR" 2>/dev/null || \
              npm pack "sherpa-onnx-darwin-x64@^${SHERPA_VER}" --pack-destination "$TMPDIR"
            mkdir -p "$TMPDIR/sherpa"
            tar -xzf "$TMPDIR"/sherpa-onnx-darwin-x64-*.tgz -C "$TMPDIR/sherpa"
            mv "$TMPDIR/sherpa/package" node_modules/sherpa-onnx-darwin-x64
            echo "✅ sherpa-onnx-darwin-x64 installed"
          fi

          # sqlite-vec-darwin-x64
          if [ ! -d node_modules/sqlite-vec-darwin-x64 ]; then
            npm pack "sqlite-vec-darwin-x64@${SQLITE_VEC_VER}" --pack-destination "$TMPDIR" 2>/dev/null || \
              npm pack "sqlite-vec-darwin-x64@${SQLITE_VEC_VER}" --pack-destination "$TMPDIR"
            mkdir -p "$TMPDIR/sqlite"
            tar -xzf "$TMPDIR"/sqlite-vec-darwin-x64-*.tgz -C "$TMPDIR/sqlite"
            mv "$TMPDIR/sqlite/package" node_modules/sqlite-vec-darwin-x64
            echo "✅ sqlite-vec-darwin-x64 installed"
          fi

      # ── Set version from workflow input ──────────────────────
      - name: Set version
        run: npm version "${{ inputs.version }}" --no-git-tag-version --allow-same-version

      # ── Build & Package ────────────────────────────────────
      - name: Build (electron-vite)
        run: pnpm build

      - name: Rebuild native addons (sherpa-onnx-node)
        run: pnpm exec electron-rebuild -f -w sherpa-onnx-node

      - name: Package (electron-builder)
        env:
          # Notarization via App Store Connect API Key.
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          if [ -n "${{ secrets.APPLE_API_KEY }}" ] && \
             [ -n "${APPLE_API_KEY_ID:-}" ] && \
             [ -n "${APPLE_API_ISSUER:-}" ]; then
            echo "[CI] Notarization: writing API key to file..."
            API_KEY_FILE="$RUNNER_TEMP/AuthKey.p8"
            echo "${{ secrets.APPLE_API_KEY }}" > "$API_KEY_FILE"
            export APPLE_API_KEY="$API_KEY_FILE"
            echo "[CI] Notarization enabled"
          else
            echo "[CI] Notarization: API key not configured"
          fi
          pnpm exec electron-builder --mac --arm64 --x64

      # ── Rename arch-less files to include x64 suffix ────────
      - name: Rename x64 artifacts
        run: |
          cd out
          VER="${{ inputs.version }}"
          for f in DeepSeno-${VER}.dmg DeepSeno-${VER}-mac.zip; do
            if [ -f "$f" ]; then
              new=$(echo "$f" | sed "s/DeepSeno-${VER}/DeepSeno-${VER}-x64/")
              mv "$f" "$new"
              echo "Renamed $f → $new"
            fi
          done
        shell: bash

      # ── Upload artifacts ───────────────────────────────────
      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: deepseno-macos
          path: |
            out/*.dmg
            out/*.zip
            out/latest-mac.yml
          if-no-files-found: error

      # ── Cleanup keychain ───────────────────────────────────
      - name: Cleanup keychain
        if: always() && steps.import-cert.outcome == 'success'
        run: security delete-keychain build.keychain || true

  # ────────────────────────────────────────────────────────────
  # Windows (x64, NSIS installer)
  # ────────────────────────────────────────────────────────────
  build-windows:
    runs-on: windows-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ── Toolchain ──────────────────────────────────────────
      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: latest

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      # ── Install dependencies ───────────────────────────────
      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # ── Bundle platform resources ──────────────────────────
      # Each bundle script is idempotent — already-present files are skipped.
      # Explicit shell: bash is required on Windows runners.
      - name: Bundle FFmpeg (win32-x64)
        shell: bash
        run: bash scripts/bundle-ffmpeg.sh --platform win32-x64

      - name: Bundle llama-server (win32-x64)
        shell: bash
        run: bash scripts/bundle-llama-server.sh --platform win32-x64

      - name: Bundle sherpa-models
        shell: bash
        run: bash scripts/bundle-sherpa-models.sh

      - name: Bundle fonts
        shell: bash
        run: bash scripts/bundle-fonts.sh

      - name: Compile Windows tools (getfg.exe / setfg.exe)
        shell: bash
        run: bash scripts/bundle-win-tools.sh

      # ── Pre-build check ────────────────────────────────────
      # Mirrors the prebuild:win script in package.json.
      # Fails fast if required assets are missing.
      - name: Pre-build check
        run: |
          node -e "
          const f = require('fs');
          const checks = [
            ['resources/ffmpeg/win32-x64/ffmpeg.exe', 'bundle-ffmpeg.sh --platform win32-x64'],
            ['scripts/getfg.exe', 'bundle-win-tools.sh'],
            ['scripts/setfg.exe', 'bundle-win-tools.sh'],
          ];
          let ok = true;
          for (const [p, src] of checks) {
            if (!f.existsSync(p)) {
              console.error('MISSING: %s — run %s', p, src);
              ok = false;
            }
          }
          if (ok) console.log('All Windows deps present.');
          else process.exit(1);
          "

      # ── Set version from workflow input ──────────────────────
      - name: Set version
        run: npm version "${{ inputs.version }}" --no-git-tag-version --allow-same-version

      # ── Build & Package ────────────────────────────────────
      - name: Build (electron-vite)
        run: pnpm build

      - name: Rebuild native addons (sherpa-onnx-node)
        run: pnpm exec electron-rebuild -f -w sherpa-onnx-node

      - name: Package (electron-builder)
        env:
          # Optional code-signing certificate (PFX base64).
          # Build runs unsigned if these are missing.
          CSC_LINK: ${{ secrets.WIN_CERTIFICATE_BASE64 }}
          CSC_KEY_PASSWORD: ${{ secrets.WIN_CERTIFICATE_PASSWORD }}
        run: pnpm exec electron-builder --win --x64

      # ── Rename to include arch suffix ───────────────────────
      - name: Rename Windows artifacts
        shell: bash
        run: |
          cd out
          VER="${{ inputs.version }}"
          for f in "DeepSeno.Setup.${VER}.exe"; do
            if [ -f "$f" ]; then
              new="DeepSeno-${VER}-win-x64.exe"
              mv "$f" "$new"
              echo "Renamed $f → $new"
            fi
          done

      # ── Upload artifacts ───────────────────────────────────
      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: deepseno-windows
          path: |
            out/*.exe
            out/latest.yml
          if-no-files-found: error

  # ────────────────────────────────────────────────────────────
  # GitHub Release
  # ────────────────────────────────────────────────────────────
  create-release:
    needs: [build-macos, build-windows]
    runs-on: ubuntu-latest
    timeout-minutes: 10

    permissions:
      contents: write

    steps:
      - name: Compute tag name
        id: tag
        run: |
          VER="${{ inputs.version }}"
          if ${{ inputs.prerelease }}; then
            TAG="pre-release-${VER}"
          else
            TAG="v${VER}"
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "name=DeepSeno ${TAG}" >> "$GITHUB_OUTPUT"

      - name: Download macOS artifacts
        uses: actions/download-artifact@v4
        with:
          name: deepseno-macos
          path: artifacts/macos

      - name: Download Windows artifacts
        uses: actions/download-artifact@v4
        with:
          name: deepseno-windows
          path: artifacts/windows

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: ${{ steps.tag.outputs.name }}
          body: |
            **DeepSeno ${{ steps.tag.outputs.name }}**

            ${{ inputs.prerelease && '> ⚠️ 这是测试版本，仅供测试使用。' || '' }}

            See [CHANGELOG.md](${{ github.server_url }}/${{ github.repository }}/blob/main/CHANGELOG.md) for details.
          prerelease: ${{ inputs.prerelease }}
          draft: false
          files: |
            artifacts/macos/*
            artifacts/windows/*
          fail_on_unmatched_files: true

      # ── Push to release server (auto-updater) ──────────────
      - name: Push to release server
        env:
          API_BASE: ${{ secrets.API_BASE_URL }}
          ADMIN_EMAIL: ${{ secrets.RELEASE_ADMIN_EMAIL }}
          ADMIN_PASSWORD: ${{ secrets.RELEASE_ADMIN_PASSWORD }}
        run: |
          [ -z "${ADMIN_EMAIL:-}" ] && echo "[Release] ADMIN_EMAIL not set, skipping" && exit 0
          set -e
          echo "[Release] Logging in..."
          TOKEN=$(curl -sf "$API_BASE/auth/login" \
            -H "Content-Type: application/json" \
            -d "{\"email\":\"$ADMIN_EMAIL\",\"password\":\"$ADMIN_PASSWORD\"}" | \
            python3 -c "import sys,json; print(json.load(sys.stdin).get('token',''))")
          [ -z "$TOKEN" ] && echo "Login failed" && exit 1

          # Upload all files and capture CDN URLs
          rm -f /tmp/confirm.json
          echo "[" > /tmp/confirm.json
          first=true

          upload_file() {
            local f="$1"
            local fname fsize resp cdn_url
            fname=$(basename "$f")
            fsize=$(stat -c%s "$f" 2>/dev/null || stat -f%z "$f" 2>/dev/null)
            echo "[Release] Uploading $fname (${fsize} bytes)..."
            
            resp=$(curl -sf "$API_BASE/admin/releases/upload-url" \
              -H "Authorization: Bearer $TOKEN" -H "Content-Type: application/json" \
              -d "{\"files\":[{\"filename\":\"$fname\",\"content_type\":\"application/octet-stream\",\"size\":$fsize}]}")
            
            cdn_url=$(echo "$resp" | python3 -c "import sys,json; print(json.load(sys.stdin)['data'][0].get('cdn_url',''))")
            presigned=$(echo "$resp" | python3 -c "import sys,json; print(json.load(sys.stdin)['data'][0].get('presigned_url',''))")
            
            curl -sf -X PUT -T "$f" "$presigned"
            echo "[Release] OK, CDN: $cdn_url"
            
            [ "$first" = true ] && first=false || echo "," >> /tmp/confirm.json
            echo -n "{\"filename\":\"$fname\",\"cdn_url\":\"$cdn_url\",\"size\":$fsize,\"checksum\":\"\"}" >> /tmp/confirm.json
          }

          for f in artifacts/macos/*.dmg artifacts/macos/*.zip artifacts/windows/*.exe; do
            [ -f "$f" ] || continue
            upload_file "$f"
          done

          echo "]" >> /tmp/confirm.json
          echo "[Release] Confirming uploads..."
          curl -sf "$API_BASE/admin/releases/confirm-upload" \
            -H "Authorization: Bearer $TOKEN" \
            -H "Content-Type: application/json" \
            -d @/tmp/confirm.json
          echo "[Release] Confirmed!"
